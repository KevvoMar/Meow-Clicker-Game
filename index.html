<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meow Clicker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>

  <div class="header__row">
    <div class="shop">
      <h1 class="shop__title">Shop</h1>
      <span class="btn__spacing"><button class="upgrade upgrade__one">Stronger Paw (+1 Per Click) <br>Cost: <span class="upgrade__cost upgrade__one--cost">20</button></span></span>
      <span class="btn__spacing"><button class="upgrade upgrade__two">Cat Toy (+1 Per Second) <br>Cost: <span class="upgrade__cost upgrade__two--cost">50</button></span></span>
      <span class="btn__spacing"><button class="upgrade upgrade__three">Super Paw (+2 Per Click) <br>Cost: <span class="upgrade__cost upgrade__three--cost">500</button></span></span>
      <span class="btn__spacing"><button class="upgrade upgrade__four">Laser Pointer (+2 Per Second) <br>Cost: <span class="upgrade__cost upgrade__four--cost">2500</button></span></span>
      <span class="btn__spacing"><button class="upgrade upgrade__five">Golden Paw (+5 Per Click) <br>Cost: <span class="upgrade__cost upgrade__five--cost">4000</button></span></span>
      <span class="btn__spacing"><button class="upgrade upgrade__six">Cat Tower (+10 Per Second) <br>Cost: <span class="upgrade__cost upgrade__six--cost">10000</button></span></span>
    </div>

    <div class="header__col">
      <div class="container">
        <h1 class="currency">Meows: 0</h1>
        <p class="currency__second">Meows Per Second: <span class="meows__per-sec">0</span> </p>
        <figure class="clicker__img--wrapper">
          <img class="clicker__img" src="./assets/image3.jpg" />
        </figure>
  </div>

        <!-- <div class="bottom__bar"> -->
          
        <div class="cheats">
          <div class="cheat__enter-bar">
            <input
              type="text"
              placeholder="Enter Cheat Code"
              class="user__input"
            />
            <div class="btn__container">
              <button class="cheat__enter-btn">Submit</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
